<html lang="en">

  <title>Recovery</title>
  <link href="/src/output.css" rel="stylesheet">
</head>

<body>
  <!--Main Card Container-->
  <div class="grid grid-cols-2 bg-[#36454F]">
    <!--Left Section Container (Confirm Recovery Phrase)-->
    <div class="bg-[#0c0f14] rounded-2xl p-8">
      <div class="flex items-center justify-between w-full mb-6">
        <div class="flex items-center gap-1">
          <a href="key_phrase.html" class="hover:bg-gray-700 rounded p-2 cursor-pointer transition-colors">
            <span class="flex items-center">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6 text-white">
                <path fill-rule="evenodd"
                  d="M11.03 3.97a.75.75 0 0 1 0 1.06l-6.22 6.22H21a.75.75 0 0 1 0 1.5H4.81l6.22 6.22a.75.75 0 1 1-1.06 1.06l-7.5-7.5a.75.75 0 0 1 0-1.06l7.5-7.5a.75.75 0 0 1 1.06 0Z"
                  clip-rule="evenodd" />
              </svg>
            </span>
          </a>
          <span class="text-white text-sm font-medium">Back</span>
        </div>

        <div class="text-white font-bold text-xl flex items-center justify-center">
          <img src="/assets/solflare.logo.svg" alt="Solflare" class="h-6 w-auto">
        </div>

        <div class="text-[#51555a] hover:bg-gray-700 rounded p-2 cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
            <path fill-rule="evenodd"
              d="M9 2.25a.75.75 0 0 1 .75.75v1.506a49.384 49.384 0 0 1 5.343.371.75.75 0 1 1-.186 1.489c-.66-.083-1.323-.151-1.99-.206a18.67 18.67 0 0 1-2.97 6.323c.318.384.65.753 1 1.107a.75.75 0 0 1-1.07 1.052A18.902 18.902 0 0 1 9 13.687a18.823 18.823 0 0 1-5.656 4.482.75.75 0 0 1-.688-1.333 17.323 17.323 0 0 0 5.396-4.353A18.72 18.72 0 0 1 5.89 8.598a.75.75 0 0 1 1.388-.568A17.21 17.21 0 0 0 9 11.224a17.168 17.168 0 0 0 2.391-5.165 48.04 48.04 0 0 0-8.298.307.75.75 0 0 1-.186-1.489 49.159 49.159 0 0 1 5.343-.371V3A.75.75 0 0 1 9 2.25ZM15.75 9a.75.75 0 0 1 .68.433l5.25 11.25a.75.75 0 1 1-1.36.634l-1.198-2.567h-6.744l-1.198 2.567a.75.75 0 0 1-1.36-.634l5.25-11.25A.75.75 0 0 1 15.75 9Zm-2.672 8.25h5.344l-2.672-5.726-2.672 5.726Z"
              clip-rule="evenodd" />
          </svg>
        </div>
      </div>

      <!--Title and Description-->
      <div class="text-center mb-6">
        <h2 class="text-2xl text-white font-bold mb-2 mt-8">Confirm Your Recovery Phrase</h2>
        <p class="text-gray-300 text-sm">Let's make sure you backed it up correctly.</p>
      </div>

      <!--Recovery Phrase Input G-->
      <div></div>

      <button class="w-full bg-[#292b31] text-[#51555a] py-2 px-4 rounded-lg font-medium transition-colors mb-4">
        Continue
      </button>

      <!--Bottom Link-->
      <div class="text-center">
        <a href="#" class="text-white hover:text-white text-sm transition-colors">
          I already have a wallet
        </a>
      </div>
    </div>

    <!--Right Section Container (Page Image)-->
    <div class="">
      <img src="/assets/recovery-key.png" alt="Recovery Key" class="w-full h-auto object-contain">
    </div>
  </div>
